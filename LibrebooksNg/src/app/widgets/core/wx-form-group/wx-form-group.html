<label [class]="['wx-form-field', intent()]" [for]="htmlFor()" [id]="id()">
    <span class="wx-form-field_label">
        {{label()}}
        @if(required()){
        <span class="wx-form-field_label_required">*</span>
        }
    </span>
    @if(helperText()){
    <span class="wx-form-field_helper-text">{{helperText()}}</span>
    }
    <span class="wx-form-field_control">
        <ng-content></ng-content>
    </span>
    @if(validationMessage()){
    <span class="wx-form-field_validation-message">
        {{validationMessage()}}
    </span>
    }
</label>
