<div class="auth-layout">
    <div class="auth-form-wrapper">
      <wx-section alignText="center" [title]="authLayout.getFormTitle()" [subTitle]="authLayout.getFormMessage()">
        @if(authLayout.getAlert()){
          <wx-alert intent="error" title="This is the title">
            <span alert-message #alertMessage>This is the message</span>
          </wx-alert>
        }
        <router-outlet></router-outlet>
      </wx-section>
    </div>
</div>
