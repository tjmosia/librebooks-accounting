<div class="auth-layout">
    <div class="auth-form-wrapper">
        <div class="auth-form-header">
            @if(authLayout.formTitle()){
            <span class="form-title">{{authLayout.formTitle()}}</span>

            @if(authLayout.formMessage()){
            <span class="form-message">{{authLayout.formMessage()}}</span>
            }
        </div>
        <router-outlet></router-outlet>
    </div>
</div>
