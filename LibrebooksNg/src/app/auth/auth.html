<div class="auth-layout">
    <div class="auth-form-wrapper">
        <div class="auth-form-header">
            @if(authLayout.getFormTitle()){
            <span class="form-title">{{authLayout.getFormTitle()}}</span>
            }
            @if(authLayout.getFormMessage()){
            <span class="form-message">{{authLayout.getFormMessage()}}</span>
            }
        </div>
        <router-outlet></router-outlet>
    </div>
</div>
