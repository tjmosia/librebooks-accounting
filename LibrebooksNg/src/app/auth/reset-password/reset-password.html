<form class="auth-form" (submit)="handleSubmit($event)">
    <wx-form-group label="Verification Code" 
         [validationMessage]="model().code.error"
         [validationState]="getModelValidationClass(model().code)">
        <wx-input-group type="text" [required]="true" 
            name="code" 
            (input)="handleInputChange($event)"
            [value]="model().code.value"  />
    </wx-form-group>
    <wx-form-group [label]="'New Password'" 
        [validationMessage]="model().password.error"
        [validationState]="getModelValidationClass(model().password)">
        <wx-input-group type="password" 
            [required]="true" name="password" 
            [value]="model().password.value" 
            (input)="handleInputChange($event)" />
    </wx-form-group>
    <wx-button type="submit" text="Reset Password" variant="primary" 
        size="medium" [loading]="authLayout.isLoading()" />
    <wx-button type="button" variant="outlined" (click)="goToAuth()">
        Change Email
    </wx-button>
</form>
